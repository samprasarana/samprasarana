<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Samprasarana</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
  <style id="home-descriptor-responsive">
    .home-descriptor > span {
      display: block;
    }

    .home-descriptor > .home-descriptor-action-mobile {
      display: none;
    }

    @media (max-width: 768px) {
      .home-descriptor {
        font-size: calc(24px - 2pt);
      }

      .home-descriptor > .home-descriptor-action-desktop {
        display: none;
      }

      .home-descriptor > .home-descriptor-action-mobile {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="page-home">
    <img src="assets/logo-mark.png" alt="Samprasarana" style="height: 150px;">

    <nav class="splash-nav">
      <a href="pictures/index.html">Pictures</a>
      <div class="splash-divider"></div>
      <span class="splash-nav-disabled-wrap" data-tooltip="Coming soon">
        <span class="splash-nav-disabled">Games</span>
      </span>
      <div class="splash-divider"></div>
      <span class="splash-nav-disabled-wrap" data-tooltip="Coming soon">
        <span class="splash-nav-disabled">Words</span>
      </span>
    </nav>

      <p class="descriptor home-descriptor" style="text-align: center;">
  <span class="home-descriptor-main">I like making stuff to look at, play, and read.</span>
  <span class="home-descriptor-action home-descriptor-action-desktop">Click a thing for more.</span>
  <span class="home-descriptor-action home-descriptor-action-mobile">Tap a thing for more.</span>
</p>
  </div>

  <div class="mouse-tooltip" id="mouse-tooltip"></div>
  <script>
    var tooltip = document.getElementById('mouse-tooltip');
    var allDisabled = document.querySelectorAll('.splash-nav-disabled-wrap');

    allDisabled.forEach(function(el) {
      el.addEventListener('mouseenter', function() {
        tooltip.textContent = el.dataset.tooltip || 'Coming soon';
        tooltip.style.display = 'block';
      });
      el.addEventListener('mousemove', function(e) {
        tooltip.style.left = e.clientX + 'px';
        tooltip.style.top = e.clientY + 'px';
      });
      el.addEventListener('mouseleave', function() {
        tooltip.style.display = 'none';
      });
    });
  </script>
</body>
</html>
